name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle 8.2
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2
    
    - name: Build with Gradle
      working-directory: WiFiCollector/WiFiCollector
      run: gradle assembleDebug --no-daemon --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: WiFiCollector/WiFiCollector/app/build/outputs/apk/debug/app-debug.apk
